<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特芙茶杭州展会电视轮播</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#050303;color:#fff;font-family:'Noto Serif SC',serif;cursor:none}
  .slide{position:absolute;inset:0;opacity:0;transition:opacity 1.15s ease;background:#050303;overflow:hidden}
  .slide.active{opacity:1;z-index:2}
  .promo{display:flex;align-items:center;justify-content:center;background:#050303}
  .promo img{width:100vw;height:100vh;object-fit:cover;display:block}
  .valley .photo{position:absolute;inset:0;background-image:var(--photo);background-size:cover;background-position:var(--pos,50% 50%);filter:saturate(1.1) contrast(1.04) brightness(.73);transform:scale(1.035)}
  .valley:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(7,3,4,.86) 0%,rgba(7,3,4,.54) 45%,rgba(7,3,4,.18) 100%),radial-gradient(circle at 20% 46%,rgba(212,134,150,.30),transparent 34%),radial-gradient(circle at 78% 72%,rgba(216,180,90,.15),transparent 30%)}
  .copy{position:absolute;z-index:2;left:86px;top:50%;transform:translateY(-50%);max-width:760px;text-shadow:0 10px 34px rgba(0,0,0,.70)}
  .kicker{display:inline-block;padding:13px 28px;border-radius:999px;border:1px solid rgba(216,180,90,.58);background:rgba(0,0,0,.28);font-size:30px;letter-spacing:5px;color:#f0cc75;font-weight:900;margin-bottom:32px}
  h1{font-size:86px;line-height:1.08;color:#fff4e9;font-weight:900;letter-spacing:2px}
  p{margin-top:28px;font-size:38px;line-height:1.42;color:#eadfd3;max-width:720px}
  .tagrow{margin-top:34px;display:flex;gap:16px;flex-wrap:wrap}.tag{padding:12px 22px;border-radius:999px;background:rgba(216,180,90,.14);border:1px solid rgba(216,180,90,.40);color:#f0cc75;font-size:27px;font-weight:900}
  .watermark{position:fixed;right:44px;bottom:30px;z-index:8;color:rgba(255,255,255,.32);font-size:24px;letter-spacing:4px;text-shadow:0 6px 20px rgba(0,0,0,.7)}
  .progress{position:fixed;left:0;bottom:0;height:5px;background:linear-gradient(90deg,#d48696,#d8b45a);z-index:20;width:0%}
</style>
</head>
<body>
  <div class="slide promo active" data-duration="11"><img src="promos/rose-oil-real-product-promo-1920x1080.png" alt="保加利亚玫瑰精油"></div>

  <div class="slide valley" data-duration="7" style="--photo:url('assets/rose-valley/rose-valley-07.jpg');--pos:50% 48%">
    <div class="photo"></div><div class="copy"><div class="kicker">保加利亚玫瑰谷</div><h1>真实玫瑰产地</h1><p>阳光、清晨与玫瑰花田，成就天然花香。</p><div class="tagrow"><span class="tag">原产地</span><span class="tag">天然花香</span><span class="tag">甄选品质</span></div></div>
  </div>

  <div class="slide valley" data-duration="7" style="--photo:url('assets/rose-valley/rose-valley-03.jpg');--pos:50% 42%">
    <div class="photo"></div><div class="copy"><div class="kicker">大马士革玫瑰</div><h1>不是香精<br>是真花香</h1><p>以真实玫瑰花蕾，呈现优雅自然的芳香体验。</p></div>
  </div>

  <div class="slide promo" data-duration="11"><img src="promos/rose-buds-promo-1920x1080.png" alt="保加利亚大马士革玫瑰花蕾"></div>

  <div class="slide valley" data-duration="7" style="--photo:url('assets/rose-valley/rose-valley-11.jpg');--pos:50% 45%">
    <div class="photo"></div><div class="copy"><div class="kicker">花田采摘</div><h1>精选整朵花蕾</h1><p>保留玫瑰的颜色、香气与自然层次。</p><div class="tagrow"><span class="tag">花草茶</span><span class="tag">礼品搭配</span><span class="tag">日常养生</span></div></div>
  </div>

  <div class="slide valley" data-duration="7" style="--photo:url('assets/rose-valley/rose-valley-12.jpg');--pos:50% 46%">
    <div class="photo"></div><div class="copy"><div class="kicker">杭州展会限定</div><h1>来自玫瑰谷的礼物</h1><p>玫瑰精油与玫瑰花蕾，现场特惠供应。</p></div>
  </div>

  <div class="watermark">特芙茶 · 保加利亚玫瑰谷</div>
  <div class="progress" id="progress"></div>
<script>
  const slides=[...document.querySelectorAll('.slide')];
  const progress=document.getElementById('progress');
  let index=0,start=performance.now();
  function show(i){slides[index].classList.remove('active');index=i%slides.length;slides[index].classList.add('active');start=performance.now();progress.style.width='0%'}
  function tick(now){const duration=(Number(slides[index].dataset.duration)||8)*1000;const pct=Math.min(100,((now-start)/duration)*100);progress.style.width=pct+'%';if(pct>=100)show(index+1);requestAnimationFrame(tick)}
  requestAnimationFrame(tick);
  document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')show(index+1);if(e.key==='ArrowLeft')show((index-1+slides.length)%slides.length)});
</script>
</body>
</html>
