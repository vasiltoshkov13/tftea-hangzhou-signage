<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>玫瑰精油杭州展会特惠</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap');
  *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090405;color:#fff;font-family:'Noto Serif SC',serif}
  .slide{position:relative;width:1920px;height:1080px;overflow:hidden;background:#090405}
  .bg{position:absolute;inset:0;background:url('../assets/rose-valley/rose-valley-07.jpg') center/cover no-repeat;filter:saturate(1.08) contrast(1.08) brightness(.42);transform:scale(1.04)}
  .veil{position:absolute;inset:0;background:linear-gradient(90deg,rgba(7,2,3,.95) 0%,rgba(20,6,11,.88) 45%,rgba(45,12,22,.48) 100%),radial-gradient(circle at 73% 48%,rgba(216,180,90,.22),transparent 34%),radial-gradient(circle at 86% 22%,rgba(212,134,150,.28),transparent 28%)}
  .brand{position:absolute;top:52px;left:76px;font-size:34px;letter-spacing:8px;color:#d8b45a;font-weight:900}.brand span{color:#d48696}
  .left{position:absolute;left:82px;top:142px;width:930px}.kicker{display:inline-flex;align-items:center;padding:13px 30px;border-radius:999px;border:1px solid rgba(216,180,90,.58);background:rgba(0,0,0,.28);font-size:32px;letter-spacing:5px;color:#f0cc75;font-weight:900}
  h1{margin:44px 0 0;font-size:116px;line-height:1.04;color:#fff4e9;font-weight:900;text-shadow:0 16px 42px rgba(0,0,0,.72)}
  .cn{margin-top:26px;font-size:58px;line-height:1.14;color:#d48696;font-weight:900;text-shadow:0 8px 28px rgba(0,0,0,.58)}
  .sub{margin-top:34px;font-size:38px;line-height:1.45;color:#eadfd3;max-width:860px;text-shadow:0 6px 22px rgba(0,0,0,.65)}
  .origin{margin-top:40px;display:flex;gap:16px;flex-wrap:wrap}.pill{padding:13px 24px;border-radius:999px;background:rgba(216,180,90,.13);border:1px solid rgba(216,180,90,.40);color:#f0cc75;font-size:29px;font-weight:900}
  .photo-card{position:absolute;right:92px;top:108px;width:620px;height:720px;border-radius:48px;padding:24px;background:linear-gradient(155deg,rgba(247,239,230,.14),rgba(216,180,90,.05));border:1px solid rgba(255,255,255,.18);box-shadow:0 34px 100px rgba(0,0,0,.58),inset 0 1px 0 rgba(255,255,255,.12);backdrop-filter:blur(4px)}
  .photo{width:100%;height:100%;border-radius:34px;background:url('../assets/products/rose-oil-real-box.jpg') center 50%/cover no-repeat;box-shadow:inset 0 0 0 1px rgba(0,0,0,.10)}
  .price-card{position:absolute;right:158px;bottom:72px;width:505px;border-radius:38px;padding:30px 38px;background:linear-gradient(135deg,rgba(18,8,9,.94),rgba(78,21,34,.91));border:1px solid rgba(216,180,90,.38);box-shadow:0 24px 74px rgba(0,0,0,.55)}
  .original{font-size:34px;color:#cdbfb5}.original span{text-decoration:line-through;text-decoration-thickness:3px;text-decoration-color:#d48696}.special{margin-top:14px;color:#d48696;font-size:34px;font-weight:900;letter-spacing:2px}.price{margin-top:-4px;font-size:126px;line-height:.88;font-weight:900;color:#fff4e9;letter-spacing:-4px}.price small{font-size:52px;color:#d8b45a;letter-spacing:0}.save{display:inline-block;margin-top:18px;padding:12px 24px;border-radius:999px;background:linear-gradient(90deg,#d48696,#d8b45a);color:#170b0b;font-size:29px;font-weight:900}
  .footer{position:absolute;left:82px;bottom:58px;font-size:31px;color:#e9d7bf}.watermark{position:absolute;right:54px;bottom:34px;color:rgba(255,255,255,.34);font-size:24px;letter-spacing:3px}
</style>
</head>
<body>
<main class="slide">
  <div class="bg"></div><div class="veil"></div>
  <div class="brand"><span>特芙茶</span> · 玫瑰谷臻选</div>
  <section class="left">
    <div class="kicker">杭州展会限定特惠</div>
    <h1>保加利亚<br>玫瑰精油</h1>
    <div class="cn">臻选礼盒装 · 5毫升</div>
    <p class="sub">来自保加利亚玫瑰谷的珍贵花香精华，适合作为优雅伴手礼与日常芳香护理。</p>
    <div class="origin"><span class="pill">5毫升</span><span class="pill">保加利亚原产</span><span class="pill">高端礼盒装</span></div>
  </section>
  <aside class="photo-card"><div class="photo"></div></aside>
  <aside class="price-card">
    <div class="original">原价 <span>¥428</span></div>
    <div class="special">展会特价</div>
    <div class="price"><small>¥</small>338</div>
    <div class="save">立省90元</div>
  </aside>
  <div class="footer">仅限杭州展会期间</div>
  <div class="watermark">保加利亚玫瑰谷</div>
</main>
</body>
</html>
