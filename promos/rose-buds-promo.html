<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>玫瑰花蕾杭州展会特惠</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap');
  *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#080405;color:#fff;font-family:'Noto Serif SC',serif}
  .slide{position:relative;width:1920px;height:1080px;overflow:hidden;background:#080405}
  .bg{position:absolute;inset:0;background:url('../assets/rose-valley/rose-valley-05.jpg') center 52%/cover no-repeat;filter:saturate(1.12) contrast(1.07) brightness(.48);transform:scale(1.04)}
  .veil{position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,2,3,.94) 0%,rgba(16,5,8,.84) 46%,rgba(62,18,34,.44) 100%),radial-gradient(circle at 76% 48%,rgba(212,134,150,.36),transparent 30%),radial-gradient(circle at 28% 78%,rgba(216,180,90,.18),transparent 28%)}
  .brand{position:absolute;top:52px;left:76px;font-size:34px;letter-spacing:8px;color:#d8b45a;font-weight:900}.brand span{color:#d48696}
  .left{position:absolute;left:82px;top:142px;width:920px}.kicker{display:inline-flex;align-items:center;padding:13px 30px;border-radius:999px;border:1px solid rgba(216,180,90,.58);background:rgba(0,0,0,.28);font-size:32px;letter-spacing:5px;color:#f0cc75;font-weight:900}
  h1{margin:42px 0 0;font-size:104px;line-height:1.05;color:#fff4e9;font-weight:900;text-shadow:0 16px 42px rgba(0,0,0,.72)}
  .cn{margin-top:24px;font-size:55px;line-height:1.14;color:#d48696;font-weight:900;text-shadow:0 8px 28px rgba(0,0,0,.58)}
  .sub{margin-top:32px;font-size:36px;line-height:1.45;color:#eadfd3;max-width:850px;text-shadow:0 6px 22px rgba(0,0,0,.65)}
  .origin{margin-top:38px;display:flex;gap:16px;flex-wrap:wrap}.pill{padding:13px 24px;border-radius:999px;background:rgba(216,180,90,.13);border:1px solid rgba(216,180,90,.40);color:#f0cc75;font-size:28px;font-weight:900}
  .product-stage{position:absolute;right:82px;top:118px;width:705px;height:690px;border-radius:56px;background:linear-gradient(155deg,rgba(247,239,230,.13),rgba(216,180,90,.06));border:1px solid rgba(255,255,255,.18);box-shadow:0 34px 100px rgba(0,0,0,.58),inset 0 1px 0 rgba(255,255,255,.12);backdrop-filter:blur(4px);overflow:hidden}
  .pouch-photo{position:absolute;right:34px;top:34px;width:360px;height:590px;border-radius:34px;background:url('../assets/products/rose-buds-pouch-real.jpg') center center/cover no-repeat;box-shadow:0 24px 62px rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.16)}
  .tin{position:absolute;left:58px;bottom:72px;width:250px;height:330px;border-radius:34px 34px 28px 28px;background:linear-gradient(90deg,#0d0d0f,#262225 42%,#09090a);border:2px solid rgba(216,180,90,.45);box-shadow:0 25px 60px rgba(0,0,0,.62),inset 18px 0 38px rgba(255,255,255,.08)}
  .tin:before{content:"";position:absolute;left:-4px;right:-4px;top:-34px;height:58px;border-radius:28px;background:linear-gradient(90deg,#1c1a1c,#343034,#101011);border:2px solid rgba(216,180,90,.50)}
  .tin-label{position:absolute;left:26px;right:26px;top:92px;padding:28px 12px;border-radius:50%;background:#070707;border:2px solid rgba(216,180,90,.55);text-align:center;color:#fff4e9;font-weight:900;font-size:34px;line-height:1.05}.tin-label small{display:block;margin-top:10px;font-size:22px;color:#d8b45a;letter-spacing:1px}
  .buds{position:absolute;border-radius:50%;background:radial-gradient(circle at 45% 35%,#e9a7ba 0 10%,#b54162 36%,#5b1727 72%);box-shadow:0 12px 24px rgba(0,0,0,.42)}
  .b1{width:86px;height:64px;left:312px;top:128px}.b2{width:62px;height:48px;left:190px;top:90px}.b3{width:74px;height:56px;right:24px;top:154px}.b4{width:55px;height:42px;left:265px;top:230px}.b5{width:70px;height:52px;left:210px;bottom:48px}.b6{width:60px;height:45px;right:332px;bottom:92px}
  .price-row{position:absolute;right:118px;bottom:72px;width:640px;display:flex;gap:22px}.price-card{flex:1;border-radius:32px;padding:26px 28px;background:linear-gradient(135deg,rgba(18,8,9,.95),rgba(78,21,34,.91));border:1px solid rgba(216,180,90,.38);box-shadow:0 24px 74px rgba(0,0,0,.55)}.pack{font-size:34px;color:#d8b45a;font-weight:900}.pack-cn{margin-top:7px;font-size:28px;color:#eadfd3}.price{margin-top:10px;font-size:80px;line-height:.95;color:#fff4e9;font-weight:900;letter-spacing:-2px}.price small{font-size:36px;color:#d8b45a}.note{margin-top:8px;color:#d48696;font-size:25px;font-weight:900}
  .footer{position:absolute;left:82px;bottom:58px;font-size:31px;color:#e9d7bf}.watermark{position:absolute;right:54px;bottom:34px;color:rgba(255,255,255,.34);font-size:24px;letter-spacing:3px}
</style>
</head>
<body>
<main class="slide">
  <div class="bg"></div><div class="veil"></div>
  <div class="brand"><span>特芙茶</span> · 玫瑰谷臻选</div>
  <section class="left">
    <div class="kicker">杭州展会限定特惠</div>
    <h1>保加利亚<br>大马士革玫瑰花蕾</h1>
    <div class="cn">天然花香 · 精选整朵花蕾</div>
    <p class="sub">来自保加利亚玫瑰谷，适合花草茶、礼品搭配与日常芳香养生。</p>
    <div class="origin"><span class="pill">50克金属罐</span><span class="pill">袋装</span><span class="pill">保加利亚原产</span></div>
  </section>
  <aside class="product-stage"><div class="tin"><div class="tin-label">特芙茶<small>50克金属罐</small></div></div><div class="pouch-photo"></div><div class="buds b1"></div><div class="buds b2"></div><div class="buds b3"></div><div class="buds b4"></div><div class="buds b5"></div><div class="buds b6"></div></aside>
  <section class="price-row">
    <div class="price-card"><div class="pack">金属罐装</div><div class="pack-cn">50克</div><div class="price"><small>¥</small>128</div><div class="note">精致礼品装</div></div>
    <div class="price-card"><div class="pack">袋装</div><div class="pack-cn">实惠装</div><div class="price"><small>¥</small>98</div><div class="note">展会优惠</div></div>
  </section>
  <div class="footer">仅限杭州展会期间</div>
  <div class="watermark">保加利亚玫瑰谷</div>
</main>
</body>
</html>
